# =============================================================================
# Nginx — two virtual hosts:
#   sfl-api.test  →  Symfony PHP-FPM (php:9000)
#   sfl.test      →  Nuxt dev server (node:3000)
#
# "default_server" on the first block ensures that requests arriving as
# "localhost" (e.g. Google OAuth redirects, curl tests) also reach Symfony.
# This is intentional: Google OAuth Console rejects .test TLDs, so APP_URL
# is set to http://localhost, and Nginx routes it here.
# =============================================================================

# ---------------------------------------------------------------------------
# sfl-api.test — Symfony backend (also default for localhost)
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name sfl-api.test localhost;

    root /app/backend/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Try static files first, then fall through to the Symfony front controller
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # PHP-FPM pass-through — only the front controller
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Required for PATH_INFO to work correctly
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Pass the host so Symfony can generate correct absolute URLs
        fastcgi_param HTTP_HOST $host;
        fastcgi_param SERVER_NAME $host;

        internal;
    }

    # Block direct access to any other .php files
    location ~ \.php$ {
        return 404;
    }

    # Deny access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ---------------------------------------------------------------------------
# sfl.test — Nuxt 4 frontend (proxied to node:3000)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name sfl.test;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://node:3000;

        proxy_http_version 1.1;

        # Required for HMR (WebSocket) in Nuxt dev mode
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Give Node time to cold-start on first request
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
