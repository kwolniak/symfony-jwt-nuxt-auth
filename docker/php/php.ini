; =============================================================================
; Custom PHP configuration — mounted at /usr/local/etc/php/conf.d/99-custom.ini
; =============================================================================

[Date]
date.timezone = UTC

[PHP]
memory_limit = 256M
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 60

; Development — show all errors
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Log errors to stderr (picked up by Docker logs)
log_errors = On
error_log = /dev/stderr

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; JIT — tracing mode (best for web workloads)
opcache.jit = tracing
opcache.jit_buffer_size = 64M

[Session]
; Secure session cookie defaults (even for local dev, good habits)
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1
session.gc_maxlifetime = 1440
