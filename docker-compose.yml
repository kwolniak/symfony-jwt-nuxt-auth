services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sfl_php
    volumes:
      - ./backend:/app/backend
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    environment:
      APP_ENV: dev
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NUXT_URL: ${NUXT_URL}
      REDIS_URL: redis://redis:6379
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      APP_URL: ${APP_URL}

  nginx:
    image: nginx:1.27-alpine
    container_name: sfl_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend:/app/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - node
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: sfl_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sfl_redis
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  node:
    image: node:22-alpine
    container_name: sfl_node
    working_dir: /app/frontend
    ports:
      - "127.0.0.1:3000:3000"
    command:
      - sh
      - -c
      - "[ -f package.json ] && npm install && npm run dev || (echo 'Frontend not initialized. Run: docker compose exec node sh -c \"npx nuxi@latest init . --no-install && npm install\"' && tail -f /dev/null)"
    volumes:
      - ./frontend:/app/frontend
    environment:
      NUXT_API_BASE_URL: ${NUXT_API_BASE_URL}
      NUXT_URL: ${NUXT_URL}
      HOST: 0.0.0.0
      PORT: 3000
    depends_on:
      - php
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
